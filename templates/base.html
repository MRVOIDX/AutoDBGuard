<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AutoDBGuard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script>
    // Apply saved theme before paint to avoid flash
    (function(){
      const t = localStorage.getItem('adg-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="/" class="nav-brand" style="text-decoration:none;">
      <span class="brand-shield">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 1.5L3 4.5V9C3 13.25 6.04 17.21 10 18.5C13.96 17.21 17 13.25 17 9V4.5L10 1.5Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M7 10L9 12L13 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="brand-name">AutoDB<span class="brand-accent">Guard</span></span>
    </a>

    <ul class="nav-links">
      <li><a href="/"         class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a></li>
      <li><a href="/app"      class="nav-link {% if request.path == '/app' %}active{% endif %}">App</a></li>
      <li><a href="/database" class="nav-link {% if request.path == '/database' %}active{% endif %}">Database</a></li>
      <li><a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a></li>
      <li><a href="/simulator" class="nav-link {% if request.path == '/simulator' %}active{% endif %}">Simulator</a></li>
      <li><a href="/upload"   class="nav-link {% if request.path == '/upload' %}active{% endif %}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:-1px;margin-right:3px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import</a></li>
      <li><a href="/wiki"     class="nav-link {% if request.path == '/wiki' %}active{% endif %}">Wiki</a></li>
      <li><a href="/about"    class="nav-link {% if request.path == '/about' %}active{% endif %}">About</a></li>
    </ul>

    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light mode">
      <span class="theme-icon-dark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </span>
      <span class="theme-icon-light">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
    </button>
  </nav>
  <div class="navbar-accent-line"></div>

  <!-- Page Content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-2px;"><path d="M10 1.5L3 4.5V9C3 13.25 6.04 17.21 10 18.5C13.96 17.21 17 13.25 17 9V4.5L10 1.5Z" fill="currentColor" fill-opacity="0.3" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10L9 12L13 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        AutoDBGuard
      </span>
      <span class="footer-sep">·</span>
      <span>MADE WITH ❤️ BY GROUP 1</span>
      <span class="footer-sep">·</span>
      <span>2026</span>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      const html  = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next    = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('adg-theme', next);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
